services:
  # 1. Discovery Server (Must start first ideally)
  - type: web
    name: edumart-discovery-server
    env: docker
    dockerContext: ./edumart-backend/EduMart-DiscoveryServer
    dockerfilePath: ./edumart-backend/EduMart-DiscoveryServer/Dockerfile
    plan: free
    envVars:
      - key: PORT
        value: 8761

  # 2. API Gateway
  - type: web
    name: edumart-gateway
    env: docker
    dockerContext: ./edumart-backend/EduMart-Gateway
    dockerfilePath: ./edumart-backend/EduMart-Gateway/Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      # In Render, web services on the same account can talk via their internal or external hostnames.
      - key: EUREKA_URI
        value: https://edumart-discovery-server.onrender.com/eureka/
      - key: EUREKA_INSTANCE_HOSTNAME
        value: edumart-gateway
      - key: PORT
        value: 8080

  # 3. Auth Service
  - type: web
    name: edumart-auth-service
    env: docker
    dockerContext: ./edumart-backend/EduMart-AuthService
    dockerfilePath: ./edumart-backend/EduMart-AuthService/Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_URI
        value: https://edumart-discovery-server.onrender.com/eureka/
      - key: EUREKA_INSTANCE_HOSTNAME
        value: edumart-auth-service
      # The actual values for these will be set securely in the Render Dashboard (Supabase / MongoDB Atlas)
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres.lcbsxoocyzpcnjyobqlz
      - key: SPRING_DATASOURCE_PASSWORD
        value: Ji0VcQZREFP4dphg
      - key: SPRING_DATA_MONGODB_URI
        value: mongodb+srv://prakharsri121198_db_user:Q1sF2xnQL2iHUE2X@edumart.aejozui.mongodb.net/edumart_student_db?appName=EDUMART
      - key: PORT
        value: 8081

  # 4. Student Service
  - type: web
    name: edumart-student-service
    env: docker
    dockerContext: ./edumart-backend/EduMart-Student-Service
    dockerfilePath: ./edumart-backend/EduMart-Student-Service/Dockerfile
    plan: free
    healthCheckPath: /actuator/health
    envVars:
      - key: EUREKA_URI
        value: https://edumart-discovery-server.onrender.com/eureka/
      - key: EUREKA_INSTANCE_HOSTNAME
        value: edumart-student-service
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://aws-1-us-west-2.pooler.supabase.com:5432/postgres?sslmode=require
      - key: SPRING_DATASOURCE_USERNAME
        value: postgres.lcbsxoocyzpcnjyobqlz
      - key: SPRING_DATASOURCE_PASSWORD
        value: Ji0VcQZREFP4dphg
      - key: SPRING_DATA_MONGODB_URI
        value: mongodb+srv://prakharsri121198_db_user:Q1sF2xnQL2iHUE2X@edumart.aejozui.mongodb.net/edumart_student_db?appName=EDUMART
      - key: PORT
        value: 8082

  # 5. React Frontend
  - type: web
    name: edumart-web-frontend
    env: static
    # Render builds Node apps natively, no Docker required for static sites!
    buildCommand: cd edumart-frontend/edumart-web && npm install && npm run build
    staticPublishPath: ./edumart-frontend/edumart-web/build
    envVars:
      - key: NODE_VERSION
        value: 18.x
      - key: REACT_APP_API_URL
        value: https://edumart-gateway.onrender.com
