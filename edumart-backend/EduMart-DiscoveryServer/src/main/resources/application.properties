spring.application.name=discovery-server
server.port=8761

# --- Eureka Server Configuration ---
# Tell the server NOT to register with itself
eureka.client.register-with-eureka=false
# Tell the server NOT to fetch the registry from itself
eureka.client.fetch-registry=false

# --- Spring Boot 4.0 Compatibility Fix ---
# Disables the client-side health indicators that often trigger the missing bean error
management.health.eureka.enabled=false

# --- Logging ---
# Reduces console noise so you can see if the server starts successfully
logging.level.com.netflix.eureka=INFO
logging.level.com.netflix.discovery=ERROR